name: Tests

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"

jobs:
  php:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP syntax check
        run: composer lint

      - name: PHP_CodeSniffer
        run: composer phpcs

      - name: PHPUnit
        run: composer test

      - name: Version consistency
        run: composer check-version

  php-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["7.4", "8.0", "8.1", "8.2", "8.3", "8.4", "8.5"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Plugin syntax compatibility
        run: find wc-stock-sync-dwenn -name '*.php' -print -exec php -l {} \;

  wordpress-woocommerce:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install wp-env
        run: npm ci --ignore-scripts

      - name: Start WordPress and WooCommerce
        run: npm run wp-env:start

      - name: Run integration smoke test
        run: npm run test:integration

      - name: Stop wp-env
        if: always()
        run: npm run wp-env:stop
